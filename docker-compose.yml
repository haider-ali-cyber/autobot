version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: trade-backend
    # Removed ports: "8000:8000" - handled by Dokploy proxy
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    env_file:
      - .env
    networks:
      - bot-network
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trade-frontend
    # Removed ports: "80:80" - handled by Dokploy proxy
    environment:
      # Internal URL for communication within Docker network
      - REACT_APP_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - bot-network
    restart: always

networks:
  bot-network:
    driver: bridge

volumes:
  bot-data:
  bot-logs:
